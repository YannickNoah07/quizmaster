name: Build QuizMaster APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Flet
        run: pip install flet

      - name: Git config
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/Android/Sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/Android/Sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/Android/Sdk/licenses/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> $HOME/Android/Sdk/licenses/android-sdk-preview-license

      - name: Build APK
        run: |
          echo "y" | flet build apk \
            --verbose \
            --no-rich-output \
            --build-number ${{ github.run_number }} \
            --build-version "1.0.${{ github.run_number }}"

      - name: Verify APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuizMaster-APK-v1.0.${{ github.run_number }}
          path: build/apk/app-release.apk
          retention-days: 7
