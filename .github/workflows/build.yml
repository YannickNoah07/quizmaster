name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ÉTAPE CRUCIALE : Gradle (Android) requiert JDK 17 pour compiler
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # OPTIMISATION MAJEURE : Installe et met en cache Flutter pour diviser le temps de build par 5
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Flet & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Lance la compilation de l'APK (Flet détectera automatiquement le SDK Flutter pré-installé)
      - name: Build Android APK
        run: |
          flet build apk

      # Récupère l'APK généré pour vous le proposer en téléchargement
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuizMaster-APK
          path: build/apk/*.apk
